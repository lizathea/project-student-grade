<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Grade</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="mb-4 text-center">My Grade List</h1>

      {% if grades == [] %}
        <div class="alert alert-info" role="alert">
          No Grade List.
        </div>
      {% else %}
        <ul class="list-group mb-4">
          {% for grade in grades %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <strong>{{ grade.student_name }}</strong> (ID: {{ grade.id }})<br>
                <span class="text-muted">{{ grade.subject }} - Grade: {{ grade.grade }}</span>
              </div>
              <div>
                <a href="{{ url_for('edit', id=grade.id) }}" class="btn btn-sm btn-outline-primary me-2">
                  Edit
                </a>
                <a href="{{ url_for('delete', id=grade.id) }}" class="btn btn-sm btn-outline-danger">
                  Delete
                </a>
              </div>
            </li>
          {% endfor %}
        </ul>
      {% endif %}

      <div class="text-center">
        <a href="{{ url_for('add') }}" class="btn btn-success">
          Add New Student Grade
        </a>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (optional) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
