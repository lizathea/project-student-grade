<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Student</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Add Student Grade</h4>
        </div>
        <div class="card-body">
          <form action="{{ url_for('add') }}" method="POST">
            <div class="mb-3">
              <label for="id" class="form-label">Student ID</label>
              <input name="id" type="number" class="form-control" id="id" required>
            </div>
            <div class="mb-3">
              <label for="student_name" class="form-label">Student Name</label>
              <input name="student_name" type="text" class="form-control" id="student_name" required>
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label">Subject</label>
              <input name="subject" type="text" class="form-control" id="subject" required>
            </div>
            <div class="mb-3">
              <label for="grade" class="form-label">Grade</label>
              <input name="grade" type="number" class="form-control" id="grade" required>
            </div>
            <button type="submit" class="btn btn-success">Add Student Grade</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (optional) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
